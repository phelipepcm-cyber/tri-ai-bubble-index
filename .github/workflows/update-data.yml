name: Atualizar TRI AI Bubble Index

on:
  workflow_dispatch:
  schedule:
    - cron: "30 8 * * *"
      timezone: "America/Sao_Paulo"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Atualizar dados do dashboard
        run: python scripts/update_dashboard.py

      - name: Salvar novos dados no GitHub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/dashboard.json

          if git diff --cached --quiet; then
            echo "Nenhuma alteração para salvar."
          else
            git commit -m "Atualiza dados do TRI AI Bubble Index"
            git push
          fi

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Preparar arquivos do site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Publicar dashboard atualizado
        id: deployment
        uses: actions/deploy-pages@v4
