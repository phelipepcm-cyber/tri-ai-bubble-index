name: Atualizar TRI AI Bubble Index

on:
  workflow_dispatch:
  schedule:
    - cron: "30 11 * * 1-5"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Atualizar dados do dashboard
        run: python scripts/update_dashboard.py

      - name: Publicar novo arquivo de dados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/dashboard.json
          if git diff --cached --quiet; then
            echo "Nenhuma alteração para publicar."
          else
            git commit -m "Atualiza TABI automaticamente"
            git push
          fi
